                        setActiveMenuItem('CONTACT'); // Set menu item as active

                        // Trigger fast spin (same as scroll behavior)
                        window.fastSpinStartAngle = window.modelCurrentAngle;
                        window.fastSpinTargetAngle = window.modelCurrentAngle; // Return to same position
                        window.fastSpinCurrentRotation = 0;
                        window.fastSpinDirection = 1; // Spin clockwise
                        window.isDoingFastSpin = true;
                        window.modelIsSpinning = false; // Stop oscillation during spin


                        // Zoom camera
                        zoomCameraTo(window.contactZoomDistance);

                        // Check if model is invisible (coming from gallery) and fade in
                        if (window.currentModel) {
                            let isCurrentlyInvisible = false;
                            window.currentModel.traverse(function (child) {
                                if (child.isMesh && child.material.opacity === 0) {
                                    isCurrentlyInvisible = true;
                                }
                            });

                            if (isCurrentlyInvisible) {
                                // Fade in the model
                                const startTime = Date.now();
                                const duration = 200; // 0.2 seconds fade in

                                function fadeInModel() {
                                    const elapsed = Date.now() - startTime;
                                    const progress = Math.min(elapsed / duration, 1);
                                    const opacity = progress; // Fade from 0 to 1

                                    window.currentModel.traverse(function (child) {
                                        if (child.isMesh) {
                                            child.material.transparent = true;
                                            child.material.opacity = opacity;
                                        }
                                    });

                                    if (progress < 1) {
                                        requestAnimationFrame(fadeInModel);
                                    }
                                }

                                fadeInModel();
                            } else {
                                // Model already visible, just ensure it's at full opacity
                                window.currentModel.traverse(function (child) {
                                    if (child.isMesh) {
                                        child.material.transparent = true;
                                        child.material.opacity = 1.0;
                                    }
                                });
                            }
                        }

                        // Animate model to contact location
                        animateModelPosition(window.contactModelLocation, 1000);

                        // Show contact overlay and create text
                        const contactOverlay = document.getElementById('contactOverlay');
                        contactOverlay.classList.add('active');
                        createContactText();
                    } else {
                        // Hide gallery and about overlays when switching to contact
                        const galleryOverlay = document.getElementById('galleryOverlay');
                        const aboutOverlay = document.getElementById('aboutOverlay');
                        galleryOverlay.classList.remove('active');
                        aboutOverlay.classList.remove('active');

                        // Remove gallery-active class for normal menu styling
                        document.body.classList.remove('gallery-active');

                        // Turn off menu blur when closing gallery
                        const menuBlur = document.querySelector('.menu-blur');
                        const menu = document.querySelector('.menu');
                        if (menuBlur) {
                            menuBlur.style.display = 'none';
                        }
                        if (menu) {
                            menu.classList.remove('blur-active');
                        }

                        // Desktop behavior: trigger fast spin instead of going to specific position
                        window.currentActiveMode = 'contact'; // Set active mode
                        setActiveMenuItem('CONTACT'); // Set menu item as active

                        // Trigger fast spin (same as scroll behavior)
                        window.fastSpinStartAngle = window.modelCurrentAngle;
                        window.fastSpinTargetAngle = window.modelCurrentAngle; // Return to same position
                        window.fastSpinCurrentRotation = 0;
                        window.fastSpinDirection = 1; // Spin clockwise
                        window.isDoingFastSpin = true;
                        window.modelIsSpinning = false; // Stop oscillation during spin


                        // Zoom camera
                        zoomCameraTo(window.contactZoomDistance);

                        // Check if model is invisible (coming from gallery) and fade in
                        if (window.currentModel) {
                            let isCurrentlyInvisible = false;
                            window.currentModel.traverse(function (child) {
                                if (child.isMesh && child.material.opacity === 0) {
                                    isCurrentlyInvisible = true;
                                }
                            });

                            if (isCurrentlyInvisible) {
                                // Fade in the model
                                const startTime = Date.now();
                                const duration = 200; // 0.2 seconds fade in

                                function fadeInModel() {
                                    const elapsed = Date.now() - startTime;
                                    const progress = Math.min(elapsed / duration, 1);
                                    const opacity = progress; // Fade from 0 to 1

                                    window.currentModel.traverse(function (child) {
                                        if (child.isMesh) {
                                            child.material.transparent = true;
                                            child.material.opacity = opacity;
                                        }
                                    });

                                    if (progress < 1) {
                                        requestAnimationFrame(fadeInModel);
                                    }
                                }

                                fadeInModel();
                            } else {
                                // Model already visible, just ensure it's at full opacity
                                window.currentModel.traverse(function (child) {
                                    if (child.isMesh) {
                                        child.material.transparent = true;
                                        child.material.opacity = 1.0;
                                    }
                                });
                            }
                        }

                        // Animate model to contact location
                        animateModelPosition(window.contactModelLocation, 1000);

                        // Show contact overlay and create text
                        const contactOverlay = document.getElementById('contactOverlay');
                        contactOverlay.classList.add('active');
                        createContactText();
                    }
                } else if (menuText === 'ABOUT') {
                    // Check if about is already active
                    if (window.currentActiveMode === 'about') {
                        // Close dropdown menu
                        toggleMenu();
                        return;
                    }

                    if (isMobile) {
                        // Mobile behavior: fade dropdown, animate CLOSE to MENU
                        const menuOverlay = document.getElementById('menuOverlay');
                        menuOverlay.classList.remove('active');
                        toggleMenu();

                        // About functionality: change position and zoom (rotation keeps oscillating)
                        const previousMode = window.currentActiveMode;

                        // Hide gallery and contact overlays
                        const galleryOverlay = document.getElementById('galleryOverlay');
                        const contactOverlay = document.getElementById('contactOverlay');
                        galleryOverlay.classList.remove('active');
                        contactOverlay.classList.remove('active');

                        // Remove gallery-active class for normal menu styling BEFORE setting active
                        document.body.classList.remove('gallery-active');

                        window.currentActiveMode = 'about';
                        setActiveMenuItem('ABOUT');

                        // Set opacity to 0 when switching from gallery to about
                        if (previousMode === 'gallery') {
                            setModelInvisible();
                        } else {
                            fadeInFromGallery();
                        }

                        // Change position and zoom
                        animateModelPosition(window.aboutModelLocation, 1000);
                        zoomCameraTo(window.aboutZoomDistance);

                        // Show about overlay
                        const aboutOverlay = document.getElementById('aboutOverlay');
                        aboutOverlay.classList.add('active');
                        createAboutText();
                    } else {
                        // Desktop behavior: change position and zoom (rotation keeps oscillating)
                        const previousMode = window.currentActiveMode;
                        window.currentActiveMode = 'about';
                        setActiveMenuItem('ABOUT');

                        // Hide gallery and contact overlays
                        const galleryOverlay = document.getElementById('galleryOverlay');
                        const contactOverlay = document.getElementById('contactOverlay');
                        galleryOverlay.classList.remove('active');
                        contactOverlay.classList.remove('active');

                        // Remove gallery-active class for normal menu styling
                        document.body.classList.remove('gallery-active');

                        // Set opacity to 0 when switching from gallery to about
                        if (previousMode === 'gallery') {
                            setModelInvisible();
                        } else {
                            fadeInFromGallery();
                        }

                        // Change position and zoom
                        animateModelPosition(window.aboutModelLocation, 1000);
                        zoomCameraTo(window.aboutZoomDistance);

                        // Show about overlay
                        const aboutOverlay = document.getElementById('aboutOverlay');
                        aboutOverlay.classList.add('active');
                        createAboutText();
                    }
                }
            }
        });

        document.addEventListener('click', function (e) {
            if (window.isApplyingRoute) return;

            const isMenuControl = e.target.classList.contains('menu-item') || e.target.classList.contains('menu-overlay-item');
            if (!isMenuControl) return;

            const menuText = e.target.textContent;
            if (menuText === 'GALLERY') {
                updateRouteForMode('gallery');
            } else if (menuText === 'CONTACT') {
                updateRouteForMode('contact');
            } else if (menuText === 'ABOUT') {
                updateRouteForMode('about');
            } else if (menuText === 'HOME') {
                updateRouteForMode(null);
            }
        });

        window.addEventListener('popstate', function () {
            if (!window.currentModel) return;
            activateRouteModeWithCover(getModeFromPath(), true);
        });

        // Function to handle about page menu background based on scroll position
        function handleAboutMenuBackground() {
            // Only apply logic when on about page
            if (window.currentActiveMode !== 'about') {
                const menuBlur = document.querySelector('.menu-blur');
                const menu = document.querySelector('.menu');
                if (menuBlur) {
                    menuBlur.style.display = 'none';
                }
                if (menu) {
                    menu.classList.remove('blur-active');
                }
                return;
            }

            const aboutContent = document.getElementById('aboutContent');
            const menuBlur = document.querySelector('.menu-blur');

            if (!aboutContent || !menuBlur) return;

            // Get scroll position of about content
            const scrollTop = aboutContent.scrollTop;

            // Threshold for overlap detection (10px as requested)
            const overlapThreshold = 45;

            if (scrollTop >= overlapThreshold) {
                // Text is scrolled down enough to potentially overlap with menu
                menuBlur.style.display = 'block';
            } else {
                // Text is at top, no overlap
                menuBlur.style.display = 'none';
            }
        }

        // Listen for scroll events on about content
        document.addEventListener('scroll', function (event) {
            // Check if the scroll event is from about content
            if (event.target && event.target.id === 'aboutContent') {
                handleAboutMenuBackground();
            }
        }, true);

        // Also listen for wheel events on about content for better mobile support
        document.addEventListener('wheel', function (event) {
            if (window.currentActiveMode === 'about') {
                handleAboutMenuBackground();
            }
        }, true);

    </script>
